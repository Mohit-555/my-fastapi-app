version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rdpmsdb}
      - POSTGRES_USER=${POSTGRES_USER:-rdpmsuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rdpmsuser123}
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-rdpmsuser}:${POSTGRES_PASSWORD:-rdpmsuser123}@db:5432/${POSTGRES_DB:-rdpmsdb}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rdpmsdb}
      - POSTGRES_USER=${POSTGRES_USER:-rdpmsuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rdpmsuser123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rdpmsuser} -d ${POSTGRES_DB:-rdpmsdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
