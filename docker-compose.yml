version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rdpms_db}
      - POSTGRES_USER=${POSTGRES_USER:-rdpms_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rdpms_password}
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-rdpms_user}:${POSTGRES_PASSWORD:-rdpms_password}@db:5432/${POSTGRES_DB:-rdpms_db}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rdpms_db}
      - POSTGRES_USER=${POSTGRES_USER:-rdpms_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rdpms_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rdpms_user} -d ${POSTGRES_DB:-rdpms_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
